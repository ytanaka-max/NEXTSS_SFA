<div class="sidebar-footer">
    <div class="csv-section">
        <p class="csv-label">📋 全リスト (SFA)</p>
        <div class="grid-2-sm">
            <button class="btn btn-ghost btn-xs" onclick="exportCSV('all')">📥 出力</button>
            <label class="btn btn-ghost btn-xs">📤 取込<input type="file" onchange="importCSV(this, 'all')" hidden></label>
        </div>
    </div>
    <div class="csv-section" style="margin-top:10px;">
        <p class="csv-label" style="color:var(--success)">💴 既存顧客データ</p>
        <div class="grid-2-sm">
            <button class="btn btn-ghost btn-xs" onclick="exportCSV('existing')">📥 出力</button>
            <label class="btn btn-ghost btn-xs">📤 取込<input type="file" onchange="importCSV(this, 'existing')" hidden></label>
        </div>
    </div>
</div>

<div class="page" id="page-phase">
    <div class="phase-container">
        <div class="phase-column" data-phase="1">
            <div class="phase-header">アプローチ</div>
            <div class="phase-list" id="list-approach"></div>
        </div>
        <div class="phase-column" data-phase="2">
            <div class="phase-header">アポイント</div>
            <div class="phase-list" id="list-appoint"></div>
        </div>
        <div class="phase-column" data-phase="3">
            <div class="phase-header">案件取得(未/無)</div>
            <div class="phase-list" id="list-project"></div>
        </div>
        <div class="phase-column" data-phase="4">
            <div class="phase-header">当て込み</div>
            <div class="phase-list" id="list-matching"></div>
        </div>
        <div class="phase-column" data-phase="5">
            <div class="phase-header">見学会</div>
            <div class="phase-list" id="list-preview"></div>
        </div>
        <div class="phase-column" data-phase="6">
            <div class="phase-header">見学結果</div>
            <div class="phase-list" id="list-result"></div>
        </div>
        <div class="phase-column" data-phase="7">
            <div class="phase-header">稼働中</div>
            <div class="phase-list" id="list-active"></div>
        </div>
    </div>
</div>
