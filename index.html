<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NEXTsalesAI - CSV管理システム</title>
    <style>
        :root {
            --next-navy: #001529;
            --next-blue: #1890ff;
            --next-green: #52c41a;
            --next-bg: #f0f2f5;
            --border-color: #d9d9d9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background-color: var(--next-bg); display: flex; height: 100vh; overflow: hidden; }

        /* サイドバー */
        .sidebar { width: 240px; background: var(--next-navy); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo { padding: 25px; font-size: 24px; font-weight: bold; background: #002140; text-align: center; color: #fff; }
        .logo span { color: var(--next-blue); }
        .nav-item { padding: 15px 25px; color: #a6adb4; cursor: pointer; border-left: 4px solid transparent; transition: 0.3s; }
        .nav-item.active { background: var(--next-blue); color: #fff; border-left-color: #fff; }

        /* メインエリア */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 65px; background: white; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 30px; justify-content: space-between; }
        
        /* ボタン類 */
        .actions { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 8px 16px; border-radius: 4px; border: 1px solid var(--border-color); cursor: pointer; font-size: 14px; transition: 0.2s; background: white; }
        .btn-primary { background: var(--next-blue); color: white; border-color: var(--next-blue); }
        .btn-success { background: var(--next-green); color: white; border-color: var(--next-green); }
        #csv-upload { display: none; }

        /* ダッシュボード */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px 30px; }
        .stat-card { background: white; padding: 15px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .stat-label { font-size: 12px; color: #8c8c8c; }
        .stat-value { font-size: 22px; font-weight: bold; margin-top: 5px; }

        /* テーブル */
        .list-container { flex: 1; padding: 0 30px 30px; overflow-y: auto; }
        .table-wrapper { background: white; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        table { border-collapse: collapse; width: 100%; font-size: 13px; table-layout: fixed; }
        th { background: #fafafa; padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 10; }
        td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        tr:hover { background-color: #e6f7ff; }

        .badge-apo { background: #f6ffed; border: 1px solid #b7eb8f; color: var(--next-green); padding: 2px 6px; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">NEXT<span>salesAI</span></div>
        <div class="nav-list">
            <div class="nav-item">📊 ダッシュボード</div>
            <div class="nav-item active">🏢 顧客一覧</div>
            <div class="nav-item">⚙️ 設定</div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div style="font-weight: bold;">SFA 取引先リスト</div>
            <div class="actions">
                <input type="file" id="csv-upload" accept=".csv">
                <button class="btn" onclick="document.getElementById('csv-upload').click()">📥 CSVインポート</button>
                <button class="btn" onclick="exportCSV()">📤 CSVエクスポート</button>
                <button class="btn btn-primary">＋ 新規登録</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="stat-card"><div class="stat-label">全リスト</div><div class="stat-value" id="total-count">100 / 919</div></div>
            <div class="stat-card"><div class="stat-label">アポ獲得</div><div class="stat-value">42 件</div></div>
            <div class="stat-card"><div class="stat-label">未着手</div><div class="stat-value">859 社</div></div>
            <div class="stat-card"><div class="stat-label">同期ステータス</div><div class="stat-value" style="color:var(--next-green); font-size:14px;">● 正常</div></div>
        </div>

        <div class="list-container">
            <div class="table-wrapper">
                <table id="sfa-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">No</th>
                            <th style="width: 180px;">企業名</th>
                            <th style="width: 120px;">支店名</th>
                            <th style="width: 80px;">職種</th>
                            <th style="width: 60px;">アポ</th>
                            <th style="width: 100px;">売上規模</th>
                            <th style="width: 110px;">最終接触日</th>
                            <th>対応内容メモ</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td style="color:var(--next-blue); font-weight:600;">アネス</td>
                            <td></td>
                            <td>空調</td>
                            <td><span class="badge-apo">〇</span></td>
                            <td></td>
                            <td>2026/02/17</td>
                            <td>担当：まつした様 5/8 16時～ まつしたさん退職 後任林様</td>
                        </tr>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CSVエクスポート機能
        function exportCSV() {
            const table = document.getElementById("sfa-table");
            let csv = [];
            const rows = table.querySelectorAll("tr");
            
            for (let i = 0; i < rows.length; i++) {
                const row = [], cols = rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length; j++) {
                    // カンマが含まれる場合に備えてダブルクォーテーションで囲む
                    row.push('"' + cols[j].innerText.replace(/"/g, '""') + '"');
                }
                csv.push(row.join(","));
            }

            const csvContent = "data:text/csv;charset=utf-8," + csv.join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "NEXTsalesAI_SFA_List.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // CSVインポート機能
        document.getElementById('csv-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const lines = text.split('\n');
                const tbody = document.querySelector('#sfa-table tbody');
                tbody.innerHTML = ''; // テーブルをクリア

                lines.forEach((line, index) => {
                    if (index === 0 || line.trim() === '') return; // ヘッダーと空行をスキップ
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // カンマ区切り（引用符考慮）
                    const row = document.createElement('tr');
                    
                    cols.forEach((col, i) => {
                        const td = document.createElement('td');
                        let val = col.replace(/^"|"$/g, ''); // 引用符を削除
                        if (i === 4 && val === '〇') { // アポ列の装飾
                            td.innerHTML = '<span class="badge-apo">〇</span>';
                        } else if (i === 1) { // 企業名の装飾
                            td.style.color = 'var(--next-blue)';
                            td.style.fontWeight = '600';
                            td.innerText = val;
                        } else {
                            td.innerText = val;
                        }
                        row.appendChild(td);
                    });
                    tbody.appendChild(row);
                });
                alert('インポートが完了しました。');
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
