<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NEXTsalesAI | 顧客・営業管理システム</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Syne:wght@800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sf-blue: #0176d3; --sf-bg: #f4f6f8; --sf-border: #dddbda;
            --sidebar: #001529; --text-main: #181818; --white: #ffffff;
            --success: #2e844a; --warning: #ff9d00; --danger: #ba0517; --gray: #8a949d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--sf-bg); display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }

        /* --- SIDEBAR --- */
        .sidebar { width: 240px; background: var(--sidebar); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-group { flex: 1; padding: 20px 0; overflow-y: auto; }
        .nav-label { font-size: 10px; color: var(--gray); padding: 0 24px 8px; font-weight: 700; text-transform: uppercase; }
        .nav-item { padding: 12px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #ced4da; font-size: 14px; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-item.active { background: var(--sf-blue); color: #fff; font-weight: 600; }

        /* --- MAIN --- */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { background: #fff; height: 60px; border-bottom: 1px solid var(--sf-border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; flex-shrink: 0; }
        .content { flex: 1; overflow-y: auto; padding: 24px; display: none; }
        .content.active { display: block; }

        /* KPI */
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 24px; }
        .kpi-card { background: #fff; border: 1px solid var(--sf-border); padding: 15px; border-radius: 4px; border-top: 4px solid var(--sf-blue); }
        .kpi-val { font-size: 24px; font-weight: 800; font-family: 'Syne'; margin-top: 5px; }

        /* FILTER AREA */
        .filter-bar { background: #fff; padding: 15px; border: 1px solid var(--sf-border); border-radius: 4px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; }
        .search-input { flex: 1; padding: 8px 12px; border: 1px solid var(--sf-border); border-radius: 4px; }

        /* TABLE */
        .table-container { background: #fff; border: 1px solid var(--sf-border); border-radius: 4px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        th { text-align: left; padding: 12px; background: #f8f9fa; border-bottom: 2px solid var(--sf-border); position: sticky; top: 0; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        tr:hover { background: #f1f7ff; }
        
        .company-name { font-weight: bold; color: var(--sf-blue); cursor: pointer; }
        .company-name:hover { text-decoration: underline; }
        .status-badge { padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .status-ok { background: #e1f5fe; color: var(--sf-blue); }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal { background: #fff; width: 800px; max-height: 85vh; border-radius: 8px; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 20px; background: var(--sidebar); color: #fff; display: flex; justify-content: space-between; }
        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
        .detail-grid { display: grid; grid-template-columns: 120px 1fr; gap: 10px 20px; }
        .detail-label { font-weight: bold; color: #666; font-size: 13px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .detail-value { font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <div style="font-family:'Syne'; font-size:22px; font-weight:800; letter-spacing:-1px;">NEXTsalesAI</div>
    </div>
    <nav class="nav-group">
        <div class="nav-label">Main</div>
        <div id="nav-dashboard" class="nav-item active" onclick="showPage('dashboard')">📊 ダッシュボード</div>
        <div id="nav-customer-info" class="nav-item" onclick="showPage('customer-info')">🏢 顧客情報リスト</div>
        <div class="nav-item">📝 営業日報</div>
        <div class="nav-label" style="margin-top:15px;">Tools</div>
        <div class="nav-item" onclick="exportData()">📥 データ出力 (CSV)</div>
    </nav>
</aside>

<main class="main">
    <header>
        <h2 id="header-title">ダッシュボード</h2>
        <div id="clock" style="font-family:'DM Mono'; font-weight:bold; color:var(--sf-blue); background:#eef4ff; padding:4px 12px; border-radius:20px;">--:--:--</div>
    </header>

    <div id="page-dashboard" class="content active">
        <div class="kpi-row">
            <div class="kpi-card"><div style="font-size:11px;color:#666;">総アプローチ対象</div><div class="kpi-val" id="kpi-total">0</div></div>
            <div class="kpi-card"><div style="font-size:11px;color:#666;">最終接触あり</div><div class="kpi-val" style="color:var(--success)" id="kpi-contacted">0</div></div>
            <div class="kpi-card"><div style="font-size:11px;color:#666;">今月のアポ数</div><div class="kpi-val" style="color:var(--warning)">24</div></div>
            <div class="kpi-card"><div style="font-size:11px;color:#666;">要フォロー</div><div class="kpi-val" style="color:var(--danger)">18</div></div>
        </div>
        <div style="font-weight:700; margin-bottom:15px; font-size:14px;">担当者別保有件数</div>
        <div id="staffCounter" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap:12px;"></div>
    </div>

    <div id="page-customer-info" class="content">
        <div class="filter-bar">
            🔍 <input type="text" id="searchInput" class="search-input" placeholder="企業名、担当者、備考内容で検索..." onkeyup="filterTable()">
            <select id="staffFilter" onchange="filterTable()" style="padding:8px; border-radius:4px; border:1px solid var(--sf-border);">
                <option value="">全ての担当者</option>
            </select>
        </div>
        <div class="table-container">
            <table id="custTable">
                <thead>
                    <tr>
                        <th style="width: 25%;">企業名</th>
                        <th style="width: 15%;">支店/事業部</th>
                        <th style="width: 12%;">職種</th>
                        <th style="width: 10%;">担当者</th>
                        <th style="width: 13%;">最終接触日</th>
                        <th style="width: 25%;">最新内容</th>
                    </tr>
                </thead>
                <tbody id="custBody"></tbody>
            </table>
        </div>
    </div>
</main>

<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="det-title" style="font-size:18px;">企業詳細</h2>
            <span onclick="closeModal()" style="cursor:pointer; font-size:24px;">&times;</span>
        </div>
        <div class="modal-body">
            <div class="detail-grid" id="det-content"></div>
            <div style="margin-top:25px; padding-top:20px; border-top:2px solid #eee;">
                <h4 style="margin-bottom:10px;">📋 備考・対応履歴詳細</h4>
                <div id="det-memo" style="background:#f9f9f9; padding:15px; border-radius:4px; font-size:13px; line-height:1.6; white-space: pre-wrap;"></div>
            </div>
            <button onclick="closeModal()" style="margin-top:30px; width:100%; padding:12px; cursor:pointer; background:var(--sidebar); color:#fff; border:none; border-radius:4px;">閉じる</button>
        </div>
    </div>
</div>

    let db = [];
    
    // データ初期化
    function initData() {
        const rows = rawData.trim().split('\n');
        db = rows.map((line, index) => {
            const cols = line.split('\t');
            return {
                id: index,
                company: cols[0] || '-',
                branch: cols[1] || '-',
                sales: cols[2] || '-',
                jobType: cols[3] || '-',
                url: cols[4] || '#',
                tel: cols[5] || '-',
                staff: cols[6] || '-',
                keyman: cols[7] || '-',
                lastContact: cols[8] || '-',
                memo: cols[9] || '-'
            };
        });
        
        // 担当者フィルタの生成
        const staffs = [...new Set(db.map(d => d.staff))].filter(s => s && s !== '-');
        const filterSelect = document.getElementById('staffFilter');
        staffs.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.innerText = s;
            filterSelect.appendChild(opt);
        });

        renderTable(db);
        updateKPI();
    }

    function renderTable(data) {
        const body = document.getElementById('custBody');
        body.innerHTML = data.map(d => `
            <tr>
                <td><span class="company-name" onclick="openDetail(${d.id})">${d.company}</span></td>
                <td>${d.branch}</td>
                <td><span class="status-badge status-ok">${d.jobType}</span></td>
                <td>${d.staff}</td>
                <td>${d.lastContact}</td>
                <td title="${d.memo}">${d.memo}</td>
            </tr>
        `).join('');
    }

    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const staffVal = document.getElementById('staffFilter').value;
        
        const filtered = db.filter(d => {
            const matchText = d.company.toLowerCase().includes(searchText) || 
                              d.memo.toLowerCase().includes(searchText) ||
                              d.keyman.toLowerCase().includes(searchText);
            const matchStaff = staffVal === "" || d.staff === staffVal;
            return matchText && matchStaff;
        });
        renderTable(filtered);
    }

    function openDetail(id) {
        const d = db.find(x => x.id === id);
        const grid = document.getElementById('det-content');
        grid.innerHTML = `
            <div class="detail-label">企業名</div><div class="detail-value"><strong>${d.company}</strong></div>
            <div class="detail-label">支店/事業部</div><div class="detail-value">${d.branch}</div>
            <div class="detail-label">売上高</div><div class="detail-value">${d.sales}</div>
            <div class="detail-label">職種</div><div class="detail-value">${d.jobType}</div>
            <div class="detail-label">電話番号</div><div class="detail-value">${d.tel}</div>
            <div class="detail-label">URL</div><div class="detail-value"><a href="${d.url}" target="_blank">${d.url}</a></div>
            <div class="detail-label">リスト担当者</div><div class="detail-value">${d.staff}</div>
            <div class="detail-label">キーマン</div><div class="detail-value">${d.keyman}</div>
            <div class="detail-label">最終接触日</div><div class="detail-value">${d.lastContact}</div>
        `;
        document.getElementById('det-memo').innerText = d.memo;
        document.getElementById('detailModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('detailModal').style.display = 'none';
    }

    function showPage(pageId) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
        document.getElementById('header-title').innerText = document.getElementById('nav-' + pageId).innerText;
    }

    function updateKPI() {
        document.getElementById('kpi-total').innerText = db.length;
        const contacted = db.filter(d => d.lastContact !== '-').length;
        document.getElementById('kpi-contacted').innerText = contacted;

        // 担当者別集計
        const counts = {};
        db.forEach(d => { if(d.staff !== '-') counts[d.staff] = (counts[d.staff] || 0) + 1; });
        
        const counterHtml = Object.entries(counts).map(([name, count]) => `
            <div class="kpi-card" style="border-top:3px solid #ccc">
                <div style="font-size:11px; color:#666;">${name}</div>
                <div class="kpi-val" style="font-size:18px;">${count} <span style="font-size:10px; font-weight:normal;">社</span></div>
            </div>
        `).join('');
        document.getElementById('staffCounter').innerHTML = counterHtml;
    }

    function exportData() {
        let csv = "企業名,支店名,売上高,職種,URL,電話番号,リスト担当者,キーマン名,最終接触日,内容\n";
        db.forEach(d => {
            csv += `"${d.company}","${d.branch}","${d.sales}","${d.jobType}","${d.url}","${d.tel}","${d.staff}","${d.keyman}","${d.lastContact}","${d.memo.replace(/"/g, '""')}"\n`;
        });
        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csv], { type: "text/csv;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "Customer_List_Full.csv";
        a.click();
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    
    // 起動
    window.onload = initData;
</script>
