<!DOCTYPE html>
<html lang="ja">
<head>
<style>
/* ... (前回のスタイルを継承) ... */
.sidebar-logo-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
.progress-container { background: var(--surface2); border-radius: 10px; padding: 15px; margin-top: 10px; }
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.progress-label { font-size: 11px; width: 80px; color: var(--text2); }
.progress-bar-bg { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.5s ease-out; }
.progress-val { font-family: 'DM Mono'; font-size: 11px; width: 30px; text-align: right; }
</style>
</head>
<body>

<div class="sidebar-desktop">
  <div class="sidebar-logo">
    <div class="sidebar-logo-title">NEXTsalesAI</div>
    <div style="font-size:9px; color:var(--text3); letter-spacing:1px; margin-top:2px;">CONSTRUCTION CRM</div>
  </div>
  
  <nav class="sidebar-nav">
    <div class="sidebar-section">分析・管理</div>
    <div class="sidebar-item active" onclick="showPage('dashboard', this)"><span class="sidebar-item-icon">📊</span>ダッシュボード</div>
    <div class="sidebar-item" onclick="showPage('customers', this)"><span class="sidebar-item-icon">🏢</span>企業・現場管理</div>
    <div class="sidebar-item" onclick="showPage('pipeline', this)"><span class="sidebar-item-icon">🎯</span>フェーズ管理</div>
  </nav>

  <div class="sidebar-footer">
    <div class="csv-box">
      <span class="csv-label">📋 SFA全リスト</span>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
        <button class="btn btn-ghost btn-xs" onclick="exportData('all')">📥 出力</button>
        <label class="btn btn-ghost btn-xs">📤 取込<input type="file" hidden onchange="importCSV(this, 'all')"></label>
      </div>
    </div>
    <div class="csv-box" style="margin-top:10px;">
      <span class="csv-label" style="color:var(--success)">💴 既存顧客データ</span>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
        <button class="btn btn-ghost btn-xs" style="color:var(--success)" onclick="exportData('existing')">📥 出力</button>
        <label class="btn btn-ghost btn-xs" style="color:var(--success)">📤 取込<input type="file" hidden onchange="importCSV(this, 'existing')"></label>
      </div>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="topbar">
    <div id="page-title" style="font-weight:700; font-size:16px;">Dashboard</div>
    <button class="topbar-btn" onclick="openAddModal()">＋ 企業追加</button>
  </div>

  <div class="content">
    <div class="page active" id="page-dashboard">
      <div class="kpi-scroll">
        <div class="kpi-card blue">
          <div class="kpi-label">総アプローチ企業</div>
          <div class="kpi-value" id="stat-total">0</div>
        </div>
        <div class="kpi-card green">
          <div class="kpi-label">既存・稼働中現場</div>
          <div class="kpi-value" id="stat-existing">0</div>
        </div>
        <div class="kpi-card orange">
          <div class="kpi-label">14日以内 未接触</div>
          <div class="kpi-value" id="stat-alert" style="color:var(--danger)">0</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title">フェーズ別進捗</div>
          <div id="phase-chart" class="progress-container">
            </div>
        </div>
        <div class="card">
          <div class="card-title">既存顧客：請求方法</div>
          <div id="billing-chart" class="progress-container">
            </div>
        </div>
      </div>

      <div class="card" style="margin: 0 14px 14px;">
        <div class="card-title">最近の営業活動</div>
        <div id="recent-logs" class="activity-list">
          <div class="empty-state">データが読み込まれていません</div>
        </div>
      </div>
    </div>

    <div class="page" id="page-customers">...</div>
    <div class="page" id="page-pipeline">...</div>
  </div>
</div>

<script>
// --- データ管理用のグローバル変数 ---
let db = {
  customers: [] // CSVからここに流し込む
};

// --- ダッシュボード更新ロジック ---
function updateDashboard() {
  const total = db.customers.length;
  const existing = db.customers.filter(c => c.isExisting === "既存").length;
  
  // 14日ルール判定
  const today = new Date();
  const alertCount = db.customers.filter(c => {
    if (!c.lastContactDate) return true;
    const diff = (today - new Date(c.lastContactDate)) / (1000 * 60 * 60 * 24);
    return diff > 14 && c.isExisting !== "既存"; // 既存以外で14日以上空いているもの
  }).length;

  // UI反映
  document.getElementById('stat-total').innerText = total.toLocaleString();
  document.getElementById('stat-existing').innerText = existing.toLocaleString();
  document.getElementById('stat-alert').innerText = alertCount.toLocaleString();

  renderPhaseChart();
}

function renderPhaseChart() {
  const phases = ["アプローチ", "アポイント", "案件取得", "当て込み", "見学会", "見学結果", "稼働中"];
  const container = document.getElementById('phase-chart');
  container.innerHTML = "";

  phases.forEach(p => {
    const count = db.customers.filter(c => c.phase === p).length;
    const percent = db.customers.length > 0 ? (count / db.customers.length * 100) : 0;
    
    container.innerHTML += `
      <div class="progress-row">
        <div class="progress-label">${p}</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${percent}%"></div></div>
        <div class="progress-val">${count}</div>
      </div>
    `;
  });
}

// --- CSVインポート処理 (雛形) ---
function importCSV(input, type) {
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    // ここでCSVをパースしてdb.customersに入れる処理を記述
    console.log("CSV読み込み完了:", type);
    // 仮データ生成（動作確認用）
    mockData(); 
    updateDashboard();
    alert(type + "データをインポートしました");
  };
  reader.readAsText(file);
}

// 動作確認用のモック
function mockData() {
  db.customers = [
    { name: "清水建設 A現場", isExisting: "未", phase: "アポイント", lastContactDate: "2026-03-01" },
    { name: "大成建設 B現場", isExisting: "既存", phase: "稼働中", lastContactDate: "2026-03-20" },
    { name: "鹿島建設 C現場", isExisting: "未", phase: "アプローチ", lastContactDate: "2026-02-10" }
  ];
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-title').innerText = el.innerText.replace(/^[^\w]*/, '');
}

// 初期化
window.onload = updateDashboard;
</script>
</body>
</html>
